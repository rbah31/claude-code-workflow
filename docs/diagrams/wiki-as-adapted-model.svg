lity</text><text x="1200" y="770" text-anchor="middle" class="body" font-size="14" fill="#2D3036">alone never gives you</text></g><g class="annotation-left"><line x1="900" y1="296" x2="900" y2="318" stroke="#C4BEAE" stroke-width="1"/><text x="900" y="290" text-anchor="middle" class="serif-it" font-size="14" fill="#7A736A">what the model already knows</text></g><g class="annotation-right"><line x1="1500" y1="296" x2="1500" y2="318" stroke="#C4BEAE" stroke-width="1"/><text x="1500" y="290" text-anchor="middle" class="serif-it" font-size="14" fill="#7A736A">what only you know</text></g><line x1="720" y1="1180" x2="1680" y2="1180" stroke="#C4BEAE" stroke-width="1"/><text x="1200" y="1210" text-anchor="middle" class="title" font-size="22">= a generic LLM becomes specific to YOUR project</text><text x="1200" y="1246" text-anchor="middle" class="serif-it" font-size="16" fill="#7A736A">Karpathy: LLM Base Knowledge</text><text x="1200" y="1288" text-anchor="middle" class="mono" font-size="13" fill="#7A736A" letter-spacing="0.08em">// the wiki = your model, locally augmented</text></svg>
