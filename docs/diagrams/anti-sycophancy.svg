<svg xmlns="http://www.w3.org/2000/svg" viewBox="300 280 1800 920" width="1800" height="920" role="img" aria-label="anti-sycophancy">

<style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Serif:ital@1&family=JetBrains+Mono:wght@400;700&display=swap');
.kicker { font-family: 'JetBrains Mono', monospace; font-weight: 400; fill: #7A736A; letter-spacing: 0.18em; }
.kicker-accent { font-family: 'JetBrains Mono', monospace; font-weight: 400; letter-spacing: 0.18em; }
.title { font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; fill: #15171A; }
.subtitle { font-family: 'IBM Plex Sans', sans-serif; font-weight: 400; fill: #2D3036; }
.body { font-family: 'IBM Plex Sans', sans-serif; font-weight: 400; fill: #2D3036; }
.muted { font-family: 'IBM Plex Sans', sans-serif; font-weight: 400; fill: #7A736A; }
.serif-it { font-family: 'IBM Plex Serif', serif; font-style: italic; }
.mono { font-family: 'JetBrains Mono', monospace; font-weight: 400; }
.mono-bold { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
]]></style>
<defs>
<marker id="tipMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7A736A"/></marker>
<marker id="tipBrick" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5C2B2E"/></marker>
<marker id="tipMoss" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3F4A3A"/></marker>
<marker id="tipText" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#15171A"/></marker>
</defs>

<g class="connectors">
  <!-- PM ↔ QA bidirectional, with markers on BOTH ends -->
  <line x1="922" y1="870" x2="1478" y2="870"
        stroke="#7A736A" stroke-width="1.5"
        marker-start="url(#tipMuted)" marker-end="url(#tipMuted)"/>
  <text x="1200" y="854" text-anchor="middle"
        class="serif-it" fill="#7A736A" font-size="18">challenges</text>
  <text x="1200" y="908" text-anchor="middle"
        class="mono" fill="#7A736A" font-size="13" letter-spacing="0.1em">bidirectional</text>

  <!-- PM → PO unidirectional escalation (curved up-right, on the LEFT side) -->
  <path d="M 780 740 C 850 640, 1100 510, 1170 442"
        fill="none" stroke="#5C2B2E" stroke-width="1.5" marker-end="url(#tipBrick)"/>
  <text x="900" y="580" class="serif-it" fill="#5C2B2E" font-size="18">escalates</text>
  <text x="900" y="606" class="mono" fill="#7A736A" font-size="13" letter-spacing="0.05em">when market-sensitive</text>

  <!-- QA ↔ Human bidirectional (curved up-left, on the RIGHT side, mirror of PM→PO) -->
  <path d="M 1620 740 C 1550 640, 1300 510, 1230 442"
        fill="none" stroke="#3F4A3A" stroke-width="1.5"
        marker-start="url(#tipMoss)" marker-end="url(#tipMoss)"/>
  <text x="1500" y="580" class="serif-it" fill="#3F4A3A" font-size="18">informs</text>
  <text x="1500" y="606" class="mono" fill="#7A736A" font-size="13" letter-spacing="0.05em">challenge findings</text>
</g>
<g class="human" data-name="human-you">
<text x="1200" y="320" text-anchor="middle" class="kicker" font-size="11" letter-spacing="0.18em">HUMAN</text>
<text x="1200" y="368" text-anchor="middle" class="serif-it" fill="#15171A" font-size="44">you</text>
<text x="1200" y="402" text-anchor="middle" class="mono" fill="#7A736A" font-size="13" letter-spacing="0.1em">direction · matter · context</text>
</g><text x="1200" y="422" text-anchor="middle" class="serif-it" font-size="16" fill="#7A736A">the PO checkpoint</text><g class="agent" data-name="agent-strategic-pm">
<rect x="590" y="740" width="320" height="260" rx="4" fill="#F0DAD3" stroke="#5C2B2E" stroke-width="1"/>
<rect x="590" y="740" width="6" height="260" fill="#5C2B2E"/>
<text x="616" y="772" class="kicker-accent" fill="#5C2B2E" font-size="10">PROPOSER</text>
<text x="616" y="804" class="title" font-size="22">strategic-pm</text>
<text x="616" y="836" class="serif-it" fill="#7A736A" font-size="13">defends with evidence</text>
<line x1="616" y1="862" x2="884" y2="862" stroke="#C4BEAE" stroke-width="1"/>
<text x="616" y="884" class="body" font-size="12">· plans sprints</text>
<text x="616" y="906" class="body" font-size="12">· makes product decisions</text>
<text x="616" y="928" class="body" font-size="12">· logs rationale in briefs/</text>
</g><g class="agent" data-name="agent-strategic-qa">
<rect x="1490" y="740" width="320" height="260" rx="4" fill="#DDE2D2" stroke="#3F4A3A" stroke-width="1"/>
<rect x="1490" y="740" width="6" height="260" fill="#3F4A3A"/>
<text x="1516" y="772" class="kicker-accent" fill="#3F4A3A" font-size="10">CHALLENGER</text>
<text x="1516" y="804" class="title" font-size="22">strategic-qa</text>
<text x="1516" y="836" class="serif-it" fill="#7A736A" font-size="13">never rubber-stamps</text>
<line x1="1516" y1="862" x2="1784" y2="862" stroke="#C4BEAE" stroke-width="1"/>
<text x="1516" y="884" class="body" font-size="12">· reviews every sprint</text>
<text x="1516" y="906" class="body" font-size="12">· blocks poor decisions</text>
<text x="1516" y="928" class="body" font-size="12">· writes qa-review.md</text>
</g><line x1="820" y1="1112" x2="1580" y2="1112" stroke="#C4BEAE" stroke-width="1"/><text x="1200" y="1140" text-anchor="middle" class="title" font-size="26">No agent reviews its own output.</text><text x="1200" y="1176" text-anchor="middle" class="serif-it" font-size="20" fill="#7A736A">The QA exists to challenge, not to validate.</text></svg>
