<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 270 2310 1010" width="2310" height="1010" role="img" aria-label="security-layers">
<rect x="10" y="270" width="2310" height="1010" fill="#FAF8F2"/>

<style><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Serif:ital@1&family=JetBrains+Mono:wght@400;700&display=swap');
.kicker { font-family: 'JetBrains Mono', monospace; font-weight: 400; fill: #7A736A; letter-spacing: 0.18em; }
.kicker-accent { font-family: 'JetBrains Mono', monospace; font-weight: 400; letter-spacing: 0.18em; }
.title { font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; fill: #15171A; }
.subtitle { font-family: 'IBM Plex Sans', sans-serif; font-weight: 400; fill: #2D3036; }
.body { font-family: 'IBM Plex Sans', sans-serif; font-weight: 400; fill: #2D3036; }
.muted { font-family: 'IBM Plex Sans', sans-serif; font-weight: 400; fill: #7A736A; }
.serif-it { font-family: 'IBM Plex Serif', serif; font-style: italic; }
.mono { font-family: 'JetBrains Mono', monospace; font-weight: 400; }
.mono-bold { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
]]></style>
<defs>
<marker id="tipMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7A736A"/></marker>
<marker id="tipBrick" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5C2B2E"/></marker>
<marker id="tipMoss" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3F4A3A"/></marker>
<marker id="tipText" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#15171A"/></marker>
</defs>
<line x1="90" y1="300" x2="90" y2="1170" stroke="#C4BEAE" stroke-width="1"/><line x1="84" y1="300" x2="96" y2="300" stroke="#7A736A" stroke-width="1"/><line x1="84" y1="578" x2="96" y2="578" stroke="#7A736A" stroke-width="1"/><text x="68" y="439" text-anchor="end" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.15em">BEFORE</text><text x="68" y="455" text-anchor="end" class="serif-it" font-size="11" fill="#7A736A">the action</text><line x1="84" y1="596" x2="96" y2="596" stroke="#7A736A" stroke-width="1"/><line x1="84" y1="874" x2="96" y2="874" stroke="#7A736A" stroke-width="1"/><text x="68" y="735" text-anchor="end" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.15em">DURING / AFTER</text><text x="68" y="751" text-anchor="end" class="serif-it" font-size="11" fill="#7A736A">the action</text><line x1="84" y1="892" x2="96" y2="892" stroke="#7A736A" stroke-width="1"/><line x1="84" y1="1170" x2="96" y2="1170" stroke="#7A736A" stroke-width="1"/><text x="68" y="1031" text-anchor="end" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.15em">AT SPRINT END</text><text x="68" y="1047" text-anchor="end" class="serif-it" font-size="11" fill="#7A736A">&amp; continuous</text><g class="layer layer-l1" data-name="security-layer-1"><rect x="120" y="300" width="2160" height="130" rx="4" fill="#A8B594" fill-opacity="0.10" stroke="#C4BEAE" stroke-width="1"/><rect x="120" y="300" width="6" height="130" fill="#A8B594"/><text x="148" y="338" text-anchor="start" class="title" font-size="36" fill="#A8B594">L1</text><text x="148" y="408" text-anchor="start" class="serif-it" font-size="12" fill="#7A736A">runtime pattern matcher</text><text x="278" y="350" text-anchor="start" class="title" font-size="24" fill="#15171A">Deny-list</text><line x1="658" y1="328" x2="658" y2="402" stroke="#C4BEAE" stroke-width="1"/><text x="688" y="336" text-anchor="start" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.18em">FIRES</text><text x="688" y="364" text-anchor="start" class="body" font-size="14" fill="#2D3036">before any bash command</text><text x="688" y="384" text-anchor="start" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.18em">CATCHES</text><text x="688" y="412" text-anchor="start" class="body" font-size="14" fill="#2D3036">31 hardcoded destructive patterns</text><line x1="1228" y1="328" x2="1228" y2="402" stroke="#C4BEAE" stroke-width="1"/><text x="1258" y="336" text-anchor="start" class="kicker" font-size="10" fill="#A8B594" letter-spacing="0.18em">EXAMPLE</text><text x="1258" y="376" text-anchor="start" class="mono" font-size="13" fill="#2D3036">rm -rf / → blocked by the runtime, shell never sees it</text></g><g class="layer layer-l2" data-name="security-layer-2"><rect x="120" y="448" width="2160" height="130" rx="4" fill="#7A8870" fill-opacity="0.10" stroke="#C4BEAE" stroke-width="1"/><rect x="120" y="448" width="6" height="130" fill="#7A8870"/><text x="148" y="486" text-anchor="start" class="title" font-size="36" fill="#7A8870">L2</text><text x="148" y="556" text-anchor="start" class="serif-it" font-size="12" fill="#7A736A">deterministic, command-type</text><text x="278" y="498" text-anchor="start" class="title" font-size="24" fill="#15171A">PreToolUse hooks</text><line x1="658" y1="476" x2="658" y2="550" stroke="#C4BEAE" stroke-width="1"/><text x="688" y="484" text-anchor="start" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.18em">FIRES</text><text x="688" y="512" text-anchor="start" class="body" font-size="14" fill="#2D3036">before Write, Edit, or Bash</text><text x="688" y="532" text-anchor="start" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.18em">CATCHES</text><text x="688" y="560" text-anchor="start" class="body" font-size="14" fill="#2D3036">variants missed by patterns; writes to /etc, ~/.ssh</text><line x1="1228" y1="476" x2="1228" y2="550" stroke="#C4BEAE" stroke-width="1"/><text x="1258" y="484" text-anchor="start" class="kicker" font-size="10" fill="#7A8870" letter-spacing="0.18em">EXAMPLE</text><text x="1258" y="524" text-anchor="start" class="mono" font-size="13" fill="#2D3036">echo x &amp;&amp; rm -rf / → caught by bash hook before execution</text></g><g class="layer layer-l3" data-name="security-layer-3"><rect x="120" y="596" width="2160" height="130" rx="4" fill="#3F4A3A" fill-opacity="0.10" stroke="#C4BEAE" stroke-width="1"/><rect x="120" y="596" width="6" height="130" fill="#3F4A3A"/><text x="148" y="634" text-anchor="start" class="title" font-size="36" fill="#3F4A3A">L3</text><text x="148" y="704" text-anchor="start" class="serif-it" font-size="12" fill="#7A736A">deterministic, always runs</text><text x="278" y="646" text-anchor="start" class="title" font-size="24" fill="#15171A">PostToolUse hooks</text><line x1="658" y1="624" x2="658" y2="698" stroke="#C4BEAE" stroke-width="1"/><text x="688" y="632" text-anchor="start" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.18em">FIRES</text><text x="688" y="660" text-anchor="start" class="body" font-size="14" fill="#2D3036">after Write/Edit and at turn end (Stop)</text><text x="688" y="680" text-anchor="start" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.18em">CATCHES</text><text x="688" y="708" text-anchor="start" class="body" font-size="14" fill="#2D3036">failing tests, lint violations, hardcoded secrets</text><line x1="1228" y1="624" x2="1228" y2="698" stroke="#C4BEAE" stroke-width="1"/><text x="1258" y="632" text-anchor="start" class="kicker" font-size="10" fill="#3F4A3A" letter-spacing="0.18em">EXAMPLE</text><text x="1258" y="672" text-anchor="start" class="mono" font-size="13" fill="#2D3036">file with sk_live_XYZ → secret scanner rejects the write</text></g><g class="layer layer-l4" data-name="security-layer-4"><rect x="120" y="744" width="2160" height="130" rx="4" fill="#B45309" fill-opacity="0.10" stroke="#C4BEAE" stroke-width="1"/><rect x="120" y="744" width="6" height="130" fill="#B45309"/><text x="148" y="782" text-anchor="start" class="title" font-size="36" fill="#B45309">L4</text><text x="148" y="852" text-anchor="start" class="serif-it" font-size="12" fill="#7A736A">context injection by path</text><text x="278" y="794" text-anchor="start" class="title" font-size="24" fill="#15171A">Scoped security rules</text><line x1="658" y1="772" x2="658" y2="846" stroke="#C4BEAE" stroke-width="1"/><text x="688" y="780" text-anchor="start" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.18em">FIRES</text><text x="688" y="808" text-anchor="start" class="body" font-size="14" fill="#2D3036">when Claude reads/writes src/auth/**, .env*, *.pem</text><text x="688" y="828" text-anchor="start" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.18em">CATCHES</text><text x="688" y="856" text-anchor="start" class="body" font-size="14" fill="#2D3036">convention violations at the point of writing</text><line x1="1228" y1="772" x2="1228" y2="846" stroke="#C4BEAE" stroke-width="1"/><text x="1258" y="780" text-anchor="start" class="kicker" font-size="10" fill="#B45309" letter-spacing="0.18em">EXAMPLE</text><text x="1258" y="820" text-anchor="start" class="mono" font-size="13" fill="#2D3036">editing src/auth/login.ts → auth.md rules auto-loaded</text></g><g class="layer layer-l5" data-name="security-layer-5"><rect x="120" y="892" width="2160" height="130" rx="4" fill="#8E3F1A" fill-opacity="0.10" stroke="#C4BEAE" stroke-width="1"/><rect x="120" y="892" width="6" height="130" fill="#8E3F1A"/><text x="148" y="930" text-anchor="start" class="title" font-size="36" fill="#8E3F1A">L5</text><text x="148" y="1000" text-anchor="start" class="serif-it" font-size="12" fill="#7A736A">self-improving discipline</text><text x="278" y="942" text-anchor="start" class="title" font-size="24" fill="#15171A">Workflow review</text><line x1="658" y1="920" x2="658" y2="994" stroke="#C4BEAE" stroke-width="1"/><text x="688" y="928" text-anchor="start" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.18em">FIRES</text><text x="688" y="956" text-anchor="start" class="body" font-size="14" fill="#2D3036">end of every sprint, in /capture-lessons</text><text x="688" y="976" text-anchor="start" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.18em">CATCHES</text><text x="688" y="1004" text-anchor="start" class="body" font-size="14" fill="#2D3036">patterns seen 2+ times → proposes new hook or rule</text><line x1="1228" y1="920" x2="1228" y2="994" stroke="#C4BEAE" stroke-width="1"/><text x="1258" y="928" text-anchor="start" class="kicker" font-size="10" fill="#8E3F1A" letter-spacing="0.18em">EXAMPLE</text><text x="1258" y="968" text-anchor="start" class="mono" font-size="13" fill="#2D3036">auth middleware missed twice → rule added for next sprint</text></g><g class="layer layer-l6" data-name="security-layer-6"><rect x="120" y="1040" width="2160" height="130" rx="4" fill="#5C2B2E" fill-opacity="0.10" stroke="#C4BEAE" stroke-width="1"/><rect x="120" y="1040" width="6" height="130" fill="#5C2B2E"/><text x="148" y="1078" text-anchor="start" class="title" font-size="36" fill="#5C2B2E">L6</text><text x="148" y="1148" text-anchor="start" class="serif-it" font-size="12" fill="#7A736A">traceability discipline</text><text x="278" y="1090" text-anchor="start" class="title" font-size="24" fill="#15171A">Audit trail</text><line x1="658" y1="1068" x2="658" y2="1142" stroke="#C4BEAE" stroke-width="1"/><text x="688" y="1076" text-anchor="start" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.18em">FIRES</text><text x="688" y="1104" text-anchor="start" class="body" font-size="14" fill="#2D3036">continuously, throughout every sprint</text><text x="688" y="1124" text-anchor="start" class="kicker" font-size="10" fill="#7A736A" letter-spacing="0.18em">CATCHES</text><text x="688" y="1152" text-anchor="start" class="body" font-size="14" fill="#2D3036">nothing directly — enables reproducibility and review</text><line x1="1228" y1="1068" x2="1228" y2="1142" stroke="#C4BEAE" stroke-width="1"/><text x="1258" y="1076" text-anchor="start" class="kicker" font-size="10" fill="#5C2B2E" letter-spacing="0.18em">EXAMPLE</text><text x="1258" y="1116" text-anchor="start" class="mono" font-size="13" fill="#2D3036">every exception logged in briefs/decisions-log.md</text></g><line x1="120" y1="1196" x2="2280" y2="1196" stroke="#C4BEAE" stroke-width="1"/><text x="1200" y="1228" text-anchor="middle" class="title" font-size="20">Layers 1–3 are deterministic. Layers 4–5 shape what Claude sees. Layer 6 makes everything reviewable.</text><text x="1200" y="1256" text-anchor="middle" class="serif-it" font-size="16" fill="#7A736A">A single layer can be bypassed. Six overlapping layers make autonomous operation safe enough to trust.</text></svg>
